name: Run Bot 6 Hours

on:
  schedule:
    - cron: "0 */6 * * *"   # පැය 6කට වරක් run වෙයි
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: 📦 Install dependencies
        run: npm install

      - name: ▶️ Run bot (6 hours loop)
        run: |
          echo "Bot started..."
          timeout 6h node index.js
